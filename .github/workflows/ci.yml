name: PR Verification CI

# 1. THE TRIGGER: When does this run?
on:
  pull_request:
    branches: [ "main" ]

# 2. THE JOBS: What the hell is it doing?
jobs:
  build-and-test:
    name: Run Linter and Tests
    # Spins up a fresh, clean Linux virtual machine
    runs-on: ubuntu-latest

    steps:
      # Step A: Download the PR's code into the virtual machine
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step B: Install the Node.js environment
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Change this if you use a different version
          cache: 'npm' # Speeds up installation by saving downloaded dependencies

      # Step C: Install dependencies exactly as they are in package-lock.json
      - name: Install Dependencies
        run: npm ci

      # Step D: Run your linter (checks for messy code syntax)
      - name: Run Linter
        run: npm run lint

      # Step E: Run your test suite (verifies the code actually works)
      - name: Run Tests
        run: npm test